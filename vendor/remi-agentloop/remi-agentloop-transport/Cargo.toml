[package]
name = "remi-agentloop-transport"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "HTTP transport abstraction and SSE transport for the remi agent framework"

[features]
default = []
http-client = ["reqwest/rustls-tls", "tokio/full"]
http-server = ["axum", "tokio/full"]

[dependencies]
remi-core = { path = "../remi-agentloop-core", package = "remi-agentloop-core", default-features = false }

futures = { workspace = true }
async-stream = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, optional = true }
tokio-stream = { workspace = true }
tokio-util = { workspace = true, features = ["io"] }

reqwest = { workspace = true, optional = true }
axum = { workspace = true, optional = true }

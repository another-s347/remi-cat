[package]
name = "remi-agentloop-model"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Model implementations (OpenAI-compatible) for the remi agent framework"

[features]
default = []
http-client = ["remi-transport/http-client"]

[dependencies]
remi-core = { path = "../remi-agentloop-core", package = "remi-agentloop-core", default-features = false }
remi-transport = { path = "../remi-agentloop-transport", package = "remi-agentloop-transport" }

futures = { workspace = true }
async-stream = { workspace = true }
futures-timer = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tracing = "0.1"

[package]
name = "remi-agentloop-tool"
version.workspace = true
edition.workspace = true
license.workspace = true
description = "Built-in tool implementations (bash, filesystem) for the remi agent framework"

[features]
default = []
tool-bash = ["tokio/process"]
tool-bash-virtual = ["dep:bashkit", "dep:async-trait", "tokio/fs"]
tool-fs = ["tokio/fs"]
tool-fs-virtual = ["dep:bashkit"]
tools = ["tool-bash", "tool-fs"]

[dependencies]
remi-core = { path = "../remi-agentloop-core", package = "remi-agentloop-core", default-features = false }

futures = { workspace = true }
async-stream = { workspace = true }
serde = { workspace = true }
serde_json = { workspace = true }
tokio = { workspace = true, optional = true }
async-trait = { version = "0.1", optional = true }
bashkit = { version = "0.1", optional = true }

[workspace]
members = [
    "crates/im-gateway",
    "crates/im-feishu",
    "crates/matcher",
    "crates/bot-core",
    "crates/proto",
    "crates/daemon",
    "crates/agent",
    "crates/mgmt-api",
    "crates/admin-ui",
]
resolver = "2"

[package]
name = "remi-cat"
version = "0.1.3"
edition = "2021"

[dependencies]
im-feishu = { path = "crates/im-feishu" }
matcher = { path = "crates/matcher" }
bot-core = { path = "crates/bot-core" }
tokio = { version = "1", features = ["full"] }
tracing = "0.1"
tracing-subscriber = { version = "0.3", features = ["env-filter"] }
serde_json = "1"
anyhow = "1"
futures = "0.3"
base64 = "0.22"

name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag (e.g. v0.2.0) — used as the GitHub Release name"
        required: true

permissions:
  contents: write

jobs:
  build-and-release:
    name: Build & publish release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: Swatinem/rust-cache@v2

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            pkg-config protobuf-compiler musl-tools

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Build release binary
        run: |
          cargo build --release --target x86_64-unknown-linux-musl \
            -p remi-cat

      - name: Prepare artifacts
        run: |
          cd target/x86_64-unknown-linux-musl/release
          cp remi-cat remi-cat-linux-x86_64
          sha256sum remi-cat-linux-x86_64 > remi-cat-linux-x86_64.sha256

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag || github.ref_name }}
          name: ${{ github.event.inputs.tag || github.ref_name }}
          generate_release_notes: true
          files: |
            target/x86_64-unknown-linux-musl/release/remi-cat-linux-x86_64
            target/x86_64-unknown-linux-musl/release/remi-cat-linux-x86_64.sha256

syntax = "proto3";

package public_api.v1;

option csharp_namespace = "PublicApi.V1";
option go_package = "github.com/example/projectremi/publicapiv1";
option java_package = "com.example.projectremi.public_api.v1";
option java_multiple_files = true;

import "remi_options.proto";
import "google/protobuf/struct.proto";

// Triggers are rule-based and stored as JSON configuration evaluated with CEL.

// Unified Public API Service
// Combines Authentication, Telemetry, and Trigger management
// All operations require appropriate authentication (JWT for authenticated operations)
service PublicService {
  // ========== Authentication Operations ==========

  // Login with email and password
  rpc Login(LoginRequest) returns (LoginResponse);

  // Logout and invalidate session
  rpc Logout(LogoutRequest) returns (LogoutResponse);

  // Refresh access token
  rpc RefreshToken(RefreshTokenRequest) returns (RefreshTokenResponse);

  // ========== Account Registration ==========

  // Signup with email and password (no email verification required)
  rpc Signup(SignupRequest) returns (SignupResponse);

  // ========== User Profile Operations ==========

  // Get the authenticated user's profile
  rpc GetProfile(GetProfileRequest) returns (ProfileResponse);

  // Update the authenticated user's profile (display_name, avatar_url)
  rpc UpdateProfile(UpdateProfileRequest) returns (UpdateProfileResponse);

  // Get a signed upload URL for avatar image
  rpc GetAvatarUploadUrl(GetAvatarUploadUrlRequest) returns (GetAvatarUploadUrlResponse);

  // Get a signed upload URL for media files (images, etc.)
  rpc GetMediaUploadUrl(GetMediaUploadUrlRequest) returns (GetMediaUploadUrlResponse);

  // ========== Telemetry Operations ==========

  // Send telemetry report from device (works both authenticated and anonymous)
  rpc SendReport(TelemetryReport) returns (ReportAck);

  // ========== Push Token Operations ==========

  // Register/update device push token (requires authentication)
  rpc RegisterPushToken(RegisterPushTokenRequest) returns (RegisterPushTokenResponse);

  // ========== App Update Operations ==========

  // Query if a newer app version is available.
  // This is intentionally unauthenticated so clients can update even when auth is broken.
  rpc GetAppUpdate(GetAppUpdateRequest) returns (GetAppUpdateResponse);

  // ========== Trigger Management Operations ==========

  // Upload a new trigger using streaming (requires authentication, user_id from session)
  rpc UploadTriggerStream(stream UploadTriggerChunk) returns (UploadTriggerResponse);

  // List user's own triggers (requires authentication)
  rpc ListTriggers(ListTriggersRequest) returns (ListTriggersResponse);

  // Get trigger artifacts using streaming (requires authentication)
  rpc GetTriggerStream(GetTriggerRequest) returns (stream GetTriggerChunk);

  // List user's own installations (requires authentication)
  rpc ListInstallations(ListInstallationsRequest) returns (ListInstallationsResponse);

  // ========== Things Collection Operations ==========

  // Create a new things collection (requires authentication)
  rpc CreateThingCollection(CreateThingCollectionRequest) returns (CreateThingCollectionResponse);

  // List user's own things collections (requires authentication)
  rpc ListThingCollections(ListThingCollectionsRequest) returns (ListThingCollectionsResponse);

  // Get a specific things collection (requires authentication)
  rpc GetThingCollection(GetThingCollectionRequest) returns (GetThingCollectionResponse);

  // Update a things collection (requires authentication)
  rpc UpdateThingCollection(UpdateThingCollectionRequest) returns (UpdateThingCollectionResponse);

  // Delete a things collection (requires authentication)
  rpc DeleteThingCollection(DeleteThingCollectionRequest) returns (DeleteThingCollectionResponse);

  // ========== Things Operations ==========

  // Create a new thing (requires authentication)
  rpc CreateThing(CreateThingRequest) returns (CreateThingResponse);

  // List user's own things (requires authentication)
  rpc ListThings(ListThingsRequest) returns (ListThingsResponse);

  // Get a specific thing (requires authentication)
  rpc GetThing(GetThingRequest) returns (GetThingResponse);

  // Update a thing (requires authentication)
  rpc UpdateThing(UpdateThingRequest) returns (UpdateThingResponse);

  // Delete a thing (requires authentication)
  rpc DeleteThing(DeleteThingRequest) returns (DeleteThingResponse);

  // ========== Trigger-Thing/Collection Relationship Operations ==========

  // Associate a trigger with a thing (requires authentication)
  rpc AssociateTriggerWithThing(AssociateTriggerWithThingRequest) returns (AssociateTriggerWithThingResponse);

  // Get trigger associated with a thing (requires authentication)
  rpc GetTriggerForThing(GetTriggerForThingRequest) returns (GetTriggerForThingResponse);

  // List all things associated with a trigger (requires authentication)
  rpc ListThingsForTrigger(ListThingsForTriggerRequest) returns (ListThingsForTriggerResponse);

  // Remove trigger-thing association (requires authentication)
  rpc DisassociateTriggerFromThing(DisassociateTriggerFromThingRequest) returns (DisassociateTriggerFromThingResponse);

  // Associate a trigger with a collection (requires authentication)
  rpc AssociateTriggerWithCollection(AssociateTriggerWithCollectionRequest) returns (AssociateTriggerWithCollectionResponse);

  // Get trigger associated with a collection (requires authentication)
  rpc GetTriggerForCollection(GetTriggerForCollectionRequest) returns (GetTriggerForCollectionResponse);

  // List all collections associated with a trigger (requires authentication)
  rpc ListCollectionsForTrigger(ListCollectionsForTriggerRequest) returns (ListCollectionsForTriggerResponse);

  // Remove trigger-collection association (requires authentication)
  rpc DisassociateTriggerFromCollection(DisassociateTriggerFromCollectionRequest) returns (DisassociateTriggerFromCollectionResponse);

  // ========== Things CRDT V3 Multi-Document Sync ==========

  // Sync a single CRDT document by key (uuid + data_type)
  // Documents are synced in priority order: root -> collection -> thing_markdown
  rpc SyncCrdtDocument(SyncCrdtDocumentRequest) returns (SyncCrdtDocumentResponse);

  // Sync multiple CRDT documents in a single roundtrip.
  rpc SyncCrdtDocuments(SyncCrdtDocumentsRequest) returns (SyncCrdtDocumentsResponse);

  // Get full snapshot of a single CRDT document
  rpc GetCrdtDocumentSnapshot(GetCrdtDocumentSnapshotRequest) returns (GetCrdtDocumentSnapshotResponse);

  // Get full snapshots for multiple CRDT documents in a single roundtrip.
  rpc GetCrdtDocumentSnapshots(GetCrdtDocumentSnapshotsRequest) returns (GetCrdtDocumentSnapshotsResponse);

  // List all CRDT document keys for the user
  rpc ListCrdtDocumentKeys(ListCrdtDocumentKeysRequest) returns (ListCrdtDocumentKeysResponse);

  // ========== Things Sync Operations (Unified for Collections and Things) ==========

  // Sync things and collections using automerge (requires authentication)
  // Collections are root-level, things are nested under their collections
  rpc SyncThings(SyncThingsRequest) returns (SyncThingsResponse);

  // Fetch the latest unified Automerge document (requires authentication)
  // Returns collections with nested things
  rpc GetThingsSnapshot(GetThingsSnapshotRequest) returns (GetThingsSnapshotResponse);

  // Query sync status for unified things/collections (requires authentication)
  rpc GetThingsSyncStatus(GetThingsSyncStatusRequest) returns (GetThingsSyncStatusResponse);

  // ========== Things Change Log Sync Operations ==========

  // Sync change logs and content snapshots (requires authentication)
  // Uploads local change logs with device_id, downloads logs from other devices
  rpc SyncThingsChangeLogs(SyncThingsChangeLogsRequest) returns (SyncThingsChangeLogsResponse);

  // Query change logs for a user (requires authentication)
  // Can filter by device_id, time range, entity, etc.
  rpc QueryThingsChangeLogs(QueryThingsChangeLogsRequest) returns (QueryThingsChangeLogsResponse);

  // ========== Chat Operations ==========

  // Chat with the remi-agentloop agent (requires authentication).
  // The device owns session memory and sends either a typed start input
  // (history + current user content) or a typed resume input
  // (agent state + tool execution results).
  rpc Chat(ChatRequest) returns (stream ChatStreamEvent);

  // Interrupt a running chat conversation (requires authentication)
  // Stops the agent execution for the given session
  rpc ChatInterrupt(ChatInterruptRequest) returns (ChatInterruptResponse);

  // Upload a chat session bundle for debugging or feedback review.
  rpc UploadChatSessionBundle(UploadChatSessionBundleRequest) returns (UploadChatSessionBundleResponse);

  // List uploaded chat session bundles belonging to the authenticated user.
  rpc ListChatSessionBundleUploads(ListChatSessionBundleUploadsRequest) returns (ListChatSessionBundleUploadsResponse);

  // Fetch a single uploaded chat session bundle belonging to the authenticated user.
  rpc GetChatSessionBundleUpload(GetChatSessionBundleUploadRequest) returns (GetChatSessionBundleUploadResponse);

  // ========== URI Resolution ==========

  // Resolve a URI (URL, remi://, etc.) and return structured metadata.
  // General-purpose: used by Thing editing, Chat preview, Share, and any URI resolution scenario.
  // For URLs: fetches the page, extracts Open Graph / HTML metadata (title, description, image, favicon).
  // For image URLs (Content-Type: image/*): returns is_image=true so clients can auto-convert to Image entries.
  rpc ResolveUri(ResolveUriRequest) returns (ResolveUriResponse);

  // ========== Application API Key Operations ==========

  // Create a new application (requires authentication)
  rpc CreateApplication(CreateApplicationRequest) returns (CreateApplicationResponse);

  // List user's own applications (requires authentication)
  rpc ListApplications(ListApplicationsRequest) returns (ListApplicationsResponse);

  // Delete an application and all its keys (requires authentication)
  rpc DeleteApplication(DeleteApplicationRequest) returns (DeleteApplicationResponse);

  // Create an API key for an application (requires authentication)
  // The plaintext key is returned once and never stored; the client must copy it
  rpc CreateApiKey(CreateApiKeyRequest) returns (CreateApiKeyResponse);

  // List API keys for an application (requires authentication)
  // Never returns the plaintext; shows prefix, status, and timestamps
  rpc ListApiKeys(ListApiKeysRequest) returns (ListApiKeysResponse);

  // Revoke an API key (requires authentication)
  rpc RevokeApiKey(RevokeApiKeyRequest) returns (RevokeApiKeyResponse);

  // ========== Cross-Device Trigger Reporting ==========

  // Report that a trigger was fired on this device so the server can fan-out
  // the event to the user's other devices (requires authentication).
  rpc ReportTriggerFired(ReportTriggerFiredRequest) returns (ReportTriggerFiredResponse);
}

// ========== Authentication Messages ==========

message LoginRequest {
  string email    = 1;
  string password = 2 [(remi.options.remi_skip_log) = true];
}

message LoginResponse {
  string access_token  = 1;
  string refresh_token = 2;
  string user_id       = 3;
  int64  expires_in    = 4;  // Seconds until access_token expires;
  string message       = 5;
}

message LogoutRequest {
  string access_token = 1;
}

message LogoutResponse {
  string message = 1;
}

message RefreshTokenRequest {
  string refresh_token = 1 [(remi.options.remi_skip_log) = true];
}

message RefreshTokenResponse {
  string access_token  = 1;
  string refresh_token = 2;
  int64  expires_in    = 3;
  string message       = 4;
}

// ========== Account Registration Messages ==========

message SignupRequest {
  string email    = 1;
  string password = 2 [(remi.options.remi_skip_log) = true];
}

message SignupResponse {
  string access_token          = 1;
  string refresh_token         = 2;
  string user_id               = 3;
  int64  expires_in            = 4;
  string message               = 5;
  bool   confirmation_required = 6; // true when email verification is needed before login
}

// ========== User Profile Messages ==========

message GetProfileRequest {
  // user_id is extracted from authentication token
}

message ProfileResponse {
  string user_id      = 1;
  string display_name = 2;
  string avatar_url   = 3;
  string email        = 4;
}

message UpdateProfileRequest {
  optional string display_name = 1;
  optional string avatar_url   = 2;
}

message UpdateProfileResponse {
  string          message = 1;
  ProfileResponse profile = 2;
}

message GetAvatarUploadUrlRequest {
  string file_extension = 1; // e.g., "jpg", "png", "webp"
}

message GetAvatarUploadUrlResponse {
  string upload_url = 1; // Signed URL for uploading the avatar image
  string public_url = 2; // Public URL of the avatar after upload
}

message GetMediaUploadUrlRequest {
  string file_extension = 1; // e.g., "jpg", "png", "webp"
  string scenario       = 2; // Upload scenario: "chat", "thing", "avatar", etc.
}

message GetMediaUploadUrlResponse {
  string upload_url = 1; // Signed URL for uploading the media file
  string public_url = 2; // Public URL of the media after upload
}

// ========== URI Resolution Messages ==========

message ResolveUriRequest {
  string uri      = 1; // URI to resolve (typically https:// URL, or remi:// URI)
  string uri_type = 2; // URI type hint: "url" (web page), "image", etc. Defaults to "url".
}

message UriMetadata {
  string original_uri = 1; // Original URI as submitted
  string title        = 2; // Page title (from og:title or <title>)
  string description  = 3; // Page description (from og:description or <meta name="description">)
  string image_url    = 4; // Preview image URL (from og:image)
  string favicon_url  = 5; // Website favicon URL
  string site_name    = 6; // Website name (from og:site_name)
  string content_type = 7; // HTTP Content-Type header value
  bool   is_image     = 8; // True when Content-Type starts with image/
  bool   resolved     = 9; // Whether metadata was successfully extracted
}

message ResolveUriResponse {
  UriMetadata metadata = 1; // Resolved metadata (present even on partial success)
  bool        success  = 2; // Whether resolution succeeded
  string      error    = 3; // Error message if success=false
}

// ========== Telemetry Messages ==========

// Generic monitoring event - event type definitions are decoupled from the protocol.
// Concrete event types (schemas, validation) are defined on the application side.
message MonitoringEvent {
  string event_type    = 1; // Event type identifier (e.g., "Connectivity", "Location", "System")
  string timestamp     = 2; // ISO8601 timestamp
  string metadata_json = 3; // Event metadata as JSON - structure defined by event type
}

message TelemetryReport {
  string                   device_id    = 1;
  string                   generated_at = 2;
  uint64                   event_count  = 3;
  repeated MonitoringEvent events       = 4 [(remi.options.remi_skip_log) = true];
  bool                     manual       = 5;
  string                   trigger      = 6;
}

message ReportAck {
  string status      = 1;
  string received_at = 2;
}

// ========== Push Token Messages ==========

message RegisterPushTokenRequest {
  // Required: stable client-side device id
  string device_id = 1;

  // Optional: push provider (defaults to "fcm")
  string provider = 2;

  // Optional: platform hint (e.g., "android", "ios")
  string platform = 3;

  // Required: FCM registration token
  string fcm_token = 4 [(remi.options.remi_skip_log) = true];

  // Optional: app version/build string
  string app_version = 5;
}

message RegisterPushTokenResponse {
  string status     = 1;
  string updated_at = 2;
}

// ========== App Update Messages ==========

message GetAppUpdateRequest {
  // Required: platform hint (e.g., "android", "ios")
  string platform = 1;

  // Optional: CPU architecture hint (e.g., "arm64")
  string arch = 2;

  // Required: build flavor ("public" or "dev")
  string flavor = 3;

  // Optional: current app version name (e.g., "1.2.3" or "1.2.3-nightly")
  string current_version_name = 4;

  // Optional: current app version code (Android versionCode)
  int32 current_version_code = 5;
}

message GetAppUpdateResponse {
  bool   update_available    = 1;
  string latest_version_name = 2;
  int32  latest_version_code = 3;
  string download_url        = 4;
  string sha256              = 5;
  uint64 size_bytes          = 6;
  string release_notes       = 7;
  bool   force_update        = 8;
  string channel             = 9;
}

// ========== Trigger Management Messages ==========

message UploadTriggerResponse {
  string uuid       = 1;
  string created_at = 2;
  string message    = 3;
}

// Request to list triggers
message ListTriggersRequest {
  string search_query = 1;  // Optional search term;
  int32  limit        = 2;  // Maximum number of results;
  int32  offset       = 3;  // Offset for pagination;
  string device_id    = 4;  // Required: only returns triggers bound to this device;
  // Only returns current user's triggers
}

message TriggerInfo {
  string uuid           = 1;
  string name           = 2;
  string user_request   = 3;
  string event_analysis = 4;
  int32  version        = 5;
  string created_at     = 6;
  string updated_at     = 7;
  string device_id      = 8;
  // Rule-based trigger configuration (JSON string)
  string rule_config_json = 9;
}

message ListTriggersResponse {
  repeated TriggerInfo triggers    = 1;
  int32                total_count = 2;  // Number of triggers in this response (not total in database);
}

// Request to get a specific trigger
message GetTriggerRequest {
  string uuid      = 1;
  string device_id = 2; // Required: must match trigger's bound device
  // Only allows access to current user's triggers
}

// Request to list installations
message ListInstallationsRequest {
  string trigger_uuid = 1;  // Optional: filter by trigger (must be user's own trigger);
  string device_id    = 2;  // Optional: filter by device (must be user's own device);
  int32  limit        = 3;
  int32  offset       = 4;
}

message InstallationInfo {
  string trigger_uuid = 1;
  string platform     = 2;
  string device_id    = 3;
  string created_at   = 4;
  string updated_at   = 5;
}

message ListInstallationsResponse {
  repeated InstallationInfo installations = 1;
  int32                     total_count   = 2;  // Number of installations in this response (not total in database);
}

// ========== Things Collection Messages ==========

message CreateThingCollectionRequest {
  string uuid  = 1; // Optional: client-generated UUID, server will generate if not provided
  string title = 2;
  // user_id is extracted from authentication token
}

message CreateThingCollectionResponse {
  string uuid       = 1;
  string title      = 2;
  string created_at = 3;
  string message    = 4;
}

message ListThingCollectionsRequest {
  int32  limit          = 1; // Maximum number of results
  int32  offset         = 2; // Offset for pagination
  string creator_app_id = 3; // Optional: filter by creator application UUID
  // Only returns current user's collections
}

message ThingCollectionInfo {
  string uuid       = 1;
  string title      = 2;
  string created_at = 3;
  string updated_at = 4;
  ActorInfo creator = 5; // Who created this collection
  ActorInfo modifier = 6; // Who most recently modified this collection
}

message ListThingCollectionsResponse {
  repeated ThingCollectionInfo collections = 1;
  int32                        total_count = 2; // Number of collections in this response
}

message GetThingCollectionRequest {
  string uuid = 1;
  // Only allows access to current user's collections
}

message GetThingCollectionResponse {
  string uuid       = 1;
  string title      = 2;
  string created_at = 3;
  string updated_at = 4;
  ActorInfo creator = 5; // Who created this collection
  ActorInfo modifier = 6; // Who most recently modified this collection
}

message UpdateThingCollectionRequest {
  string uuid  = 1;
  string title = 2;
  // Only allows update to current user's collections
}

message UpdateThingCollectionResponse {
  string uuid       = 1;
  string title      = 2;
  string updated_at = 3;
  string message    = 4;
}

message DeleteThingCollectionRequest {
  string uuid = 1;
  // Only allows delete of current user's collections
}

message DeleteThingCollectionResponse {
  string message = 1;
}

// ========== Things Messages ==========

message CreateThingRequest {
  string uuid            = 1; // Optional: client-generated UUID, server will generate if not provided
  string datatype        = 2; // Type of data: 'text', 'location', 'image', etc.
  string data_json       = 3; // JSON string containing the data, structure depends on datatype
  string parent_uuid     = 4; // Optional: UUID of parent thing for hierarchical organization
  string collection_uuid = 5; // UUID of collection this thing belongs to
  string title           = 6; // Optional: short user-facing title
  // user_id is extracted from authentication token
}

message CreateThingResponse {
  string uuid       = 1;
  string datatype   = 2;
  string data_json  = 3;
  string created_at = 4;
  string message    = 5;
  string title      = 6;
}

message ListThingsRequest {
  string collection_uuid = 1; // Optional: filter by collection (must be user's own collection)
  string parent_uuid     = 2; // Optional: filter by parent thing
  string datatype        = 3; // Optional: filter by datatype
  int32  limit           = 4; // Maximum number of results
  int32  offset          = 5; // Offset for pagination
  string creator_app_id  = 6; // Optional: filter by creator application UUID
  // Only returns current user's things
}

message ThingInfo {
  string    uuid            = 1;
  string    datatype        = 2;
  string    data_json       = 3; // JSON string containing the data
  string    parent_uuid     = 4; // Optional: may be empty if no parent
  string    collection_uuid = 5;
  string    created_at      = 6;
  string    updated_at      = 7;
  string    title           = 8;
  ActorInfo creator         = 9; // Who created this thing
  ActorInfo modifier        = 10; // Who most recently modified this thing
}

message ListThingsResponse {
  repeated ThingInfo things      = 1;
  int32              total_count = 2; // Number of things in this response
}

message GetThingRequest {
  string uuid = 1;
  // Only allows access to current user's things
}

message GetThingResponse {
  string    uuid            = 1;
  string    datatype        = 2;
  string    data_json       = 3;
  string    parent_uuid     = 4;
  string    collection_uuid = 5;
  string    created_at      = 6;
  string    updated_at      = 7;
  string    title           = 8;
  ActorInfo creator         = 9; // Who created this thing
  ActorInfo modifier        = 10; // Who most recently modified this thing
}

message UpdateThingRequest {
  string uuid            = 1;
  string datatype        = 2; // Optional: update datatype
  string data_json       = 3; // Optional: update data
  string parent_uuid     = 4; // Optional: update parent (empty string to remove parent)
  string collection_uuid = 5; // Optional: move to different collection
  string title           = 6; // Optional: update title
  // Only allows update to current user's things
}

message UpdateThingResponse {
  string uuid       = 1;
  string datatype   = 2;
  string data_json  = 3;
  string updated_at = 4;
  string message    = 5;
  string title      = 6;
}

message DeleteThingRequest {
  string uuid = 1;
  // Only allows delete of current user's things
}

message DeleteThingResponse {
  string message = 1;
}

// Streaming message for uploading triggers (public API)
message UploadTriggerChunk {
  // Metadata sent in first chunk (user_id is extracted from auth token)
  message Metadata {
    string uuid           = 1;
    string name           = 2;
    string user_request   = 3;
    string event_analysis = 4;
    int32  version        = 5;

    oneof publish_binding {
      string bind_thing_uuid      = 6;
      string bind_collection_uuid = 7;
    }

    // Rule-based trigger configuration (JSON string)
    // When set, this is a rule-based trigger that uses CEL expressions
    string rule_config_json = 8;

    // Required: bind this trigger to a specific device.
    string device_id = 9;

    // Rule-based triggers only.
  }

  Metadata metadata = 1;
}

// Streaming message for downloading triggers (public API)
message GetTriggerChunk {
  // Metadata sent in first chunk
  message Metadata {
    string uuid           = 1;
    string name           = 2;
    string user_request   = 3;
    string event_analysis = 4;
    int32  version        = 5;
    string created_at     = 6;
    string updated_at     = 7;
    // Rule-based trigger configuration (JSON string)
    string rule_config_json = 8;

    // Device this trigger is bound to.
    string device_id = 9;
  }

  Metadata metadata = 1;
}

// ========== Trigger-Thing/Collection Relationship Messages ==========

message AssociateTriggerWithThingRequest {
  string trigger_uuid = 1;
  string thing_uuid   = 2;
  // user_id is extracted from authentication token
}

message AssociateTriggerWithThingResponse {
  string trigger_uuid = 1;
  string thing_uuid   = 2;
  string created_at   = 3;
  string message      = 4;
}

message GetTriggerForThingRequest {
  string thing_uuid = 1;
  // Only allows access to current user's things
}

message GetTriggerForThingResponse {
  string trigger_uuid = 1; // Empty if no trigger associated
  string thing_uuid   = 2;
  string created_at   = 3;
}

message ListThingsForTriggerRequest {
  string trigger_uuid = 1;
  // Only returns things belonging to current user
}

message TriggerThingInfo {
  string thing_uuid   = 1;
  string trigger_uuid = 2;
  string created_at   = 3;
}

message ListThingsForTriggerResponse {
  repeated TriggerThingInfo associations = 1;
  int32                     total_count  = 2;
}

message DisassociateTriggerFromThingRequest {
  string thing_uuid = 1;
  // Only allows disassociation of current user's things
}

message DisassociateTriggerFromThingResponse {
  string message = 1;
}

message AssociateTriggerWithCollectionRequest {
  string trigger_uuid    = 1;
  string collection_uuid = 2;
  // user_id is extracted from authentication token
}

message AssociateTriggerWithCollectionResponse {
  string trigger_uuid    = 1;
  string collection_uuid = 2;
  string created_at      = 3;
  string message         = 4;
}

message GetTriggerForCollectionRequest {
  string collection_uuid = 1;
  // Only allows access to current user's collections
}

message GetTriggerForCollectionResponse {
  string trigger_uuid    = 1; // Empty if no trigger associated
  string collection_uuid = 2;
  string created_at      = 3;
}

message ListCollectionsForTriggerRequest {
  string trigger_uuid = 1;
  // Only returns collections belonging to current user
}

message TriggerCollectionInfo {
  string collection_uuid = 1;
  string trigger_uuid    = 2;
  string created_at      = 3;
}

message ListCollectionsForTriggerResponse {
  repeated TriggerCollectionInfo associations = 1;
  int32                          total_count  = 2;
}

message DisassociateTriggerFromCollectionRequest {
  string collection_uuid = 1;
  // Only allows disassociation of current user's collections
}

message DisassociateTriggerFromCollectionResponse {
  string message = 1;
}

// ========== CRDT V3 Multi-Document Sync Messages ==========

// CRDT document data types (sync priority: root=0, collection=1, thing_markdown=2)
enum CrdtDataType {
  CRDT_DATA_TYPE_UNSPECIFIED    = 0;
  CRDT_DATA_TYPE_ROOT           = 1; // Root document: list of collection UUIDs
  CRDT_DATA_TYPE_COLLECTION     = 2; // Collection document: collection meta + thing metas
  CRDT_DATA_TYPE_THING_MARKDOWN = 3; // ThingMarkdown document: content for a single thing
}

// Sync a single CRDT document
message SyncCrdtDocumentRequest {
  string       device_id     = 1; // Client device identifier (required)
  string       document_uuid = 2; // Document UUID (e.g., "root", collection UUID, thing UUID)
  CrdtDataType data_type     = 3; // Document type
  bytes        sync_message  = 4; // Encoded automerge::sync::Message (may be empty)
}

message SyncCrdtDocumentResponse {
  repeated bytes sync_messages = 1; // Encoded automerge::sync::Message values
  string         last_sync_at  = 2;
}

message SyncCrdtDocumentInput {
  string       document_uuid = 1;
  CrdtDataType data_type     = 2;
  bytes        sync_message  = 3;
}

message SyncCrdtDocumentsRequest {
  string                       device_id = 1;
  repeated SyncCrdtDocumentInput documents = 2;
}

message SyncCrdtDocumentResult {
  string         document_uuid = 1;
  CrdtDataType   data_type     = 2;
  repeated bytes sync_messages = 3;
  string         last_sync_at  = 4;
}

message SyncCrdtDocumentsResponse {
  repeated SyncCrdtDocumentResult documents = 1;
}

// Get full snapshot of a CRDT document
message GetCrdtDocumentSnapshotRequest {
  string       device_id        = 1;
  string       document_uuid    = 2;
  CrdtDataType data_type        = 3;
  bool         reset_sync_state = 4; // If true, resets server-side per-device sync state
}

message GetCrdtDocumentSnapshotResponse {
  bytes  automerge_doc = 1; // Full Automerge document bytes
  string last_sync_at  = 2;
}

message CrdtDocumentRef {
  string       document_uuid = 1;
  CrdtDataType data_type     = 2;
}

message GetCrdtDocumentSnapshotsRequest {
  string                   device_id        = 1;
  repeated CrdtDocumentRef documents        = 2;
  bool                     reset_sync_state = 3;
}

message CrdtDocumentSnapshot {
  string       document_uuid = 1;
  CrdtDataType data_type     = 2;
  bytes        automerge_doc = 3;
  string       last_sync_at  = 4;
}

message GetCrdtDocumentSnapshotsResponse {
  repeated CrdtDocumentSnapshot snapshots = 1;
}

// List all CRDT document keys
message ListCrdtDocumentKeysRequest {
  // No parameters needed, returns all documents for authenticated user
}

message ListCrdtDocumentKeysResponse {
  repeated CrdtDocumentKey keys = 1;
}

message CrdtDocumentKey {
  string       document_uuid = 1;
  CrdtDataType data_type     = 2;
  bytes        canonical_head = 3; // Current canonical server head, empty when unavailable
}

// ========== Things Sync Messages ==========

message SyncThingsRequest {
  string device_id    = 1; // Client device identifier (required)
  bytes  sync_message = 2; // Encoded automerge::sync::Message (may be empty)
}

message SyncThingsResponse {
  repeated bytes sync_messages = 1; // Encoded automerge::sync::Message values (may be empty)
  string         last_sync_at  = 2;
}

message GetThingsSnapshotRequest {
  string device_id        = 1; // Client device identifier (required)
  bool   reset_sync_state = 2; // If true, resets server-side per-device sync state
}

message GetThingsSnapshotResponse {
  bytes  automerge_doc = 1; // Full Automerge document bytes (AutoCommit::save())
  string last_sync_at  = 2;
}

message GetThingsSyncStatusRequest {
  string device_id               = 1; // Client device identifier (required)
  bytes  last_synced_server_head = 2; // Client's last known server head (32 bytes ChangeHash). Empty if unknown.
}

message GetThingsSyncStatusResponse {
  bytes  server_head          = 1; // Server canonical head (32 bytes ChangeHash)
  uint64 remote_ahead_changes = 2; // Number of server changes not included at last_synced_server_head
  bool   remote_in_sync       = 3; // Convenience: remote_ahead_changes == 0
  string last_sync_at         = 4;
}

// ========== Things Change Log Sync Messages ==========

// A single change log entry for sync
message ThingsChangeLogEntry {
  int64  id                  = 1; // Local row ID (may differ across devices)
  string entity_type         = 2; // "collection" or "thing"
  string entity_id           = 3; // UUID of the collection or thing
  string operation           = 4; // "create", "update", "delete", "undo", etc.
  string field_name          = 5; // Field that was changed (optional)
  string old_value           = 6; // Previous value (optional, for undo)
  string new_value           = 7; // New value (optional, for display)
  string change_description  = 8; // Human-readable description
  int64  timestamp_ms        = 9; // Unix timestamp in milliseconds
  string device_id           = 10; // Device that made this change
  int64  related_snapshot_id = 11; // Related content snapshot ID (optional)
}

// A content snapshot for sync
message ThingsContentSnapshot {
  int64  id           = 1; // Local row ID (may differ across devices)
  string entity_type  = 2; // "collection" or "thing"
  string entity_id    = 3; // UUID of the collection or thing
  string content_json = 4; // Full JSON content at time of snapshot
  int64  timestamp_ms = 5; // Unix timestamp in milliseconds
  string device_id    = 6; // Device that created this snapshot
}

// Request to sync change logs
message SyncThingsChangeLogsRequest {
  string                         device_id               = 1; // This device's identifier
  repeated ThingsChangeLogEntry  upload_change_logs      = 2; // Change logs to upload
  repeated ThingsContentSnapshot upload_snapshots        = 3; // Content snapshots to upload
  int64                          last_synced_log_id      = 4; // Last synced log ID from server (for download)
  int64                          last_synced_snapshot_id = 5; // Last synced snapshot ID from server
}

// Response with synced change logs
message SyncThingsChangeLogsResponse {
  repeated ThingsChangeLogEntry  download_change_logs    = 1; // Change logs from other devices
  repeated ThingsContentSnapshot download_snapshots      = 2; // Content snapshots from other devices
  int64                          server_max_log_id       = 3; // Max log ID on server (for next sync)
  int64                          server_max_snapshot_id  = 4; // Max snapshot ID on server
  int32                          uploaded_log_count      = 5; // Number of logs successfully uploaded
  int32                          uploaded_snapshot_count = 6; // Number of snapshots successfully uploaded
}

// Request to query change logs with filters
message QueryThingsChangeLogsRequest {
  string device_id      = 1; // This device's identifier
  string filter_device  = 2; // Filter by specific device (optional)
  string filter_entity  = 3; // Filter by entity_id (optional)
  int64  from_timestamp = 4; // Start of time range (optional)
  int64  to_timestamp   = 5; // End of time range (optional)
  int32  limit          = 6; // Max number of results (default 100)
  int32  offset         = 7; // Pagination offset
}

// Response with queried change logs
message QueryThingsChangeLogsResponse {
  repeated ThingsChangeLogEntry change_logs = 1;
  int32                         total_count = 2; // Total matching count
  bool                          has_more    = 3; // More results available
}

// ========== Collections Sync Messages ==========

// ========== Chat Messages ==========

message ChatRequest {
  string session_id = 1; // Client chat session ID.
  string device_id  = 6; // Client device identifier (forwarded in request metadata).

  oneof input {
    ChatStartInput  start  = 7;
    ChatResumeInput resume = 8;
  }

  // Reserved legacy fields:
  // - 2: `message`
  // - 3: `resume_value`
  // - 4: `system_prompt`
  // - 5: `messages`
  reserved 2, 3, 4, 5;
}

// Start a new agent turn. The device sends the full prior history and the
// current user message content separately, matching remi-agentloop LoopInput::Start.
message ChatStartInput {
  repeated ChatHistoryMessage history  = 1;
  ChatInputMessage            current  = 2;
  google.protobuf.Struct      metadata = 3;
  repeated google.protobuf.Struct extra_tools = 4; // remi-agentloop ToolDefinition JSON objects supplied by the outer runtime.
  google.protobuf.Struct      user_state = 5;
}

// Resume after external tool execution, matching remi-agentloop LoopInput::Resume.
message ChatResumeInput {
  google.protobuf.Struct       state   = 1;
  repeated ChatToolCallOutcome results = 2;
}

// A full history message stored by the device runtime.
message ChatHistoryMessage {
  string                   id                = 1;
  string                   role              = 2; // "system", "user", "assistant", or "tool"
  string                   content           = 3;
  repeated ChatContentPart content_parts     = 4;
  repeated ChatToolCall    tool_calls        = 5;
  string                   tool_call_id      = 6;
  string                   reasoning_content = 7;
}

// Current user input content for a new turn.
message ChatInputMessage {
  string                   role          = 1;
  string                   content       = 2;
  repeated ChatContentPart content_parts = 3; // Multimodal content parts (takes precedence over content if non-empty)
}

message ChatToolCall {
  string                 id        = 1;
  string                 tool_name = 2;
  google.protobuf.Struct arguments = 3;
}

// Wrapper for multipart tool call results (needed because oneof cannot hold repeated fields)
message ChatToolCallResultParts {
  repeated ChatContentPart parts = 1;
}

message ChatToolCallOutcome {
  string tool_call_id = 1;
  string tool_name    = 2;

  oneof outcome {
    string                    result = 3;
    string                    error  = 4;
    ChatToolCallResultParts   parts  = 5; // Multimodal result (images, mixed content)
  }
}

// A single part of multimodal message content (text, image, or URI resource)
message ChatContentPart {
  string type = 1; // "text", "image_url", or "resource_uri"
  oneof value {
    string              text         = 2; // Text content (when type="text")
    ChatImageContent    image_url    = 3; // Image content (when type="image_url")
    ChatResourceContent resource_uri = 4; // Generic URI resource (when type="resource_uri")
  }
}

// Image content for multimodal chat messages
message ChatImageContent {
  string url        = 1; // Image URL or data:image/...;base64,... data URI
  string detail     = 2; // Detail level: "auto", "low", "high" (OpenAI standard)
  bytes  data       = 3; // Raw image bytes (alternative to url)
  string media_type = 4; // MIME type when using data (e.g. "image/png")
}

// Generic resource content referenced by a remi:// URI.
// The server resolves the URI to actual content before forwarding to the LLM.
// Extensible: resource_type hints enable different processing pipelines.
message ChatResourceContent {
  string uri           = 1; // remi:// URI pointing to the resource
  string resource_type = 2; // Resource type hint: "image", "url", "audio", "document", etc.
}

message ChatInterruptRequest {
  string session_id = 1; // Chat session/thread ID to interrupt
}

message ChatInterruptResponse {
  bool   success = 1; // Whether the interrupt was successful
  string message = 2; // Optional message about the interrupt
}

message UploadChatSessionBundleRequest {
  string                 session_id    = 1;
  string                 device_id     = 2;
  string                 title         = 3;
  string                 feedback_kind = 4;
  string                 bundle_json   = 5;
  google.protobuf.Struct metadata      = 6;
}

message UploadChatSessionBundleResponse {
  string upload_id   = 1;
  string received_at = 2;
}

message ChatSessionBundleUploadInfo {
  string upload_id     = 1;
  string session_id    = 2;
  string device_id     = 3;
  string title         = 4;
  string feedback_kind = 5;
  string created_at    = 6;
  string updated_at    = 7;
}

message ListChatSessionBundleUploadsRequest {
  int32 limit  = 1;
  int32 offset = 2;
}

message ListChatSessionBundleUploadsResponse {
  repeated ChatSessionBundleUploadInfo uploads     = 1;
  int32                               total_count = 2;
}

message GetChatSessionBundleUploadRequest {
  string upload_id = 1;
}

message GetChatSessionBundleUploadResponse {
  ChatSessionBundleUploadInfo upload    = 1;
  string                     bundle_json = 2;
  google.protobuf.Struct     metadata    = 3;
}

message ChatRunStartEvent {
  string                 thread_id = 1;
  string                 run_id    = 2;
  google.protobuf.Struct metadata  = 3;
}

message ChatDeltaEvent {
  string content = 1;
  string role    = 2;
}

message ChatThinkingStartEvent {}

message ChatThinkingEndEvent {
  string content = 1;
}

message ChatToolCallStartEvent {
  string id        = 1;
  string tool_name = 2;
}

message ChatToolCallDeltaEvent {
  string id              = 1;
  string arguments_delta = 2;
}

message ChatToolDeltaEvent {
  string id        = 1;
  string tool_name = 2;
  string delta     = 3;
}

message ChatToolResultEvent {
  string id        = 1;
  string tool_name = 2;
  string result    = 3;
}

message ChatSubSessionStartEvent {}

message ChatSubSessionDeltaEvent {
  string content = 1;
}

message ChatSubSessionThinkingStartEvent {}

message ChatSubSessionThinkingEndEvent {
  string content = 1;
}

message ChatSubSessionToolCallStartEvent {
  string id        = 1;
  string tool_name = 2;
}

message ChatSubSessionToolCallDeltaEvent {
  string id              = 1;
  string arguments_delta = 2;
}

message ChatSubSessionToolDeltaEvent {
  string id        = 1;
  string tool_name = 2;
  string delta     = 3;
}

message ChatSubSessionToolResultEvent {
  string id        = 1;
  string tool_name = 2;
  string result    = 3;
}

message ChatSubSessionTurnStartEvent {
  uint32 turn = 1;
}

message ChatSubSessionDoneEvent {
  string final_output = 1;
}

message ChatSubSessionErrorEvent {
  string message = 1;
}

message ChatSubSessionEvent {
  string parent_tool_call_id = 1;
  string sub_session_id      = 2;
  string sub_run_id          = 3;
  string agent_name          = 4;
  string title               = 5;
  uint32 depth               = 6;

  oneof event {
    ChatSubSessionStartEvent         start             = 10;
    ChatSubSessionDeltaEvent         delta             = 11;
    ChatSubSessionThinkingStartEvent thinking_start    = 12;
    ChatSubSessionThinkingEndEvent   thinking_end      = 13;
    ChatSubSessionToolCallStartEvent tool_call_start   = 14;
    ChatSubSessionToolCallDeltaEvent tool_call_delta   = 15;
    ChatSubSessionToolDeltaEvent     tool_delta        = 16;
    ChatSubSessionToolResultEvent    tool_result       = 17;
    ChatSubSessionTurnStartEvent     turn_start        = 18;
    ChatSubSessionDoneEvent          done              = 19;
    ChatSubSessionErrorEvent         error             = 20;
  }
}

message ChatInterruptInfo {
  string                 interrupt_id = 1;
  string                 tool_call_id = 2;
  string                 tool_name    = 3;
  string                 kind         = 4;
  google.protobuf.Struct data         = 5;
}

message ChatInterruptStreamEvent {
  repeated ChatInterruptInfo interrupts = 1;
}

message ChatTurnStartEvent {
  uint32 turn = 1;
}

message ChatUsageEvent {
  uint32 prompt_tokens     = 1;
  uint32 completion_tokens = 2;
}

message ChatErrorEvent {
  string message = 1;
  string code    = 2;
}

message ChatDoneEvent {
  google.protobuf.Struct state = 1;
}

message ChatCancelledEvent {}

message ChatNeedToolExecutionEvent {
  google.protobuf.Struct       state             = 1;
  repeated ChatToolCall        tool_calls        = 2;
  repeated ChatToolCallOutcome completed_results = 3;
}

message ChatCustomEvent {
  string                 event_type = 1;
  google.protobuf.Struct extra      = 2;
}

message ChatStreamEvent {
  oneof event {
    ChatRunStartEvent          run_start           = 1;
    ChatDeltaEvent             delta               = 2;
    ChatThinkingStartEvent     thinking_start      = 3;
    ChatThinkingEndEvent       thinking_end        = 4;
    ChatToolCallStartEvent     tool_call_start     = 5;
    ChatToolCallDeltaEvent     tool_call_delta     = 6;
    ChatToolDeltaEvent         tool_delta          = 7;
    ChatToolResultEvent        tool_result         = 8;
    ChatInterruptStreamEvent   interrupt           = 9;
    ChatTurnStartEvent         turn_start          = 10;
    ChatUsageEvent             usage               = 11;
    ChatErrorEvent             error               = 12;
    ChatDoneEvent              done                = 13;
    ChatCancelledEvent         cancelled           = 14;
    ChatNeedToolExecutionEvent need_tool_execution = 15;
    ChatCustomEvent            custom              = 16;
    ChatSubSessionEvent        sub_session         = 17;
  }
}

// ===== LangChain-aligned message schema =====
//
// This section intentionally mirrors LangChain's Message/MessageChunk shape.
// - ToolCall.args: structured object
// - ToolCallChunk.args: JSON substring string (to be concatenated by index)

message UsageMetadata {
  uint32              input_tokens         = 1;
  uint32              output_tokens        = 2;
  uint32              total_tokens         = 3;
  map<string, uint32> input_token_details  = 4;
  map<string, uint32> output_token_details = 5;
}

message ToolCall {
  string                 name  = 1;
  google.protobuf.Struct args  = 2;
  string                 id    = 3;
  google.protobuf.Struct extra = 4;
}

message ToolCallChunk {
  string                 name  = 1;
  string                 args  = 2;
  string                 id    = 3;
  int32                  index = 4;
  google.protobuf.Struct extra = 5;
}

message InvalidToolCall {
  string                 name  = 1;
  string                 args  = 2;
  string                 id    = 3;
  string                 error = 4;
  google.protobuf.Struct extra = 5;
}

message AIMessage {
  string                   id                 = 1;
  string                   content            = 2;
  google.protobuf.Struct   additional_kwargs  = 3;
  google.protobuf.Struct   response_metadata  = 4;
  repeated ToolCall        tool_calls         = 5;
  repeated InvalidToolCall invalid_tool_calls = 6;
  UsageMetadata            usage_metadata     = 7;
}

message HumanMessage {
  string                 id                = 1;
  string                 content           = 2;
  google.protobuf.Struct additional_kwargs = 3;
  google.protobuf.Struct response_metadata = 4;
}

message SystemMessage {
  string                 id                = 1;
  string                 content           = 2;
  google.protobuf.Struct additional_kwargs = 3;
  google.protobuf.Struct response_metadata = 4;
}

message ToolMessage {
  string                 id                = 1;
  string                 content           = 2;
  google.protobuf.Struct additional_kwargs = 3;
  google.protobuf.Struct response_metadata = 4;
  string                 tool_call_id      = 5;
}

message AIMessageChunk {
  string                   id                       = 1;
  string                   content                  = 2;
  google.protobuf.Struct   additional_kwargs        = 3;
  google.protobuf.Struct   response_metadata        = 4;
  repeated ToolCallChunk   tool_call_chunks         = 5;
  repeated InvalidToolCall invalid_tool_call_chunks = 6;
  UsageMetadata            usage_metadata           = 7;
}

message HumanMessageChunk {
  string                 id                = 1;
  string                 content           = 2;
  google.protobuf.Struct additional_kwargs = 3;
  google.protobuf.Struct response_metadata = 4;
}

message SystemMessageChunk {
  string                 id                = 1;
  string                 content           = 2;
  google.protobuf.Struct additional_kwargs = 3;
  google.protobuf.Struct response_metadata = 4;
}

message ToolMessageChunk {
  string                 id                = 1;
  string                 content           = 2;
  google.protobuf.Struct additional_kwargs = 3;
  google.protobuf.Struct response_metadata = 4;
  string                 tool_call_id      = 5;
}

message InterruptData {
  string                 id    = 1; // Interrupt ID
  google.protobuf.Struct value = 2; // Interrupt payload (e.g., {"type": "trigger_published", "trigger_name": "..."})
}

message InterruptEvent {
  repeated InterruptData interrupts = 1; // Array of interrupt events
}

message AnyMessage {
  oneof message {
    AIMessage     ai_message     = 1;
    HumanMessage  human_message  = 2;
    SystemMessage system_message = 3;
    ToolMessage   tool_message   = 4;

    AIMessageChunk     ai_message_chunk     = 11;
    HumanMessageChunk  human_message_chunk  = 12;
    SystemMessageChunk system_message_chunk = 13;
    ToolMessageChunk   tool_message_chunk   = 14;

    InterruptEvent interrupt_event = 20;
  }
}

// ========== Actor Info (shared by Things responses) ==========

// Describes an actor attached to creator/modifier attribution.
// When actor_type == APPLICATION, app_id and app_name are populated.
message ActorInfo {
  enum ActorType {
    USER        = 0;
    APPLICATION = 1;
  }
  ActorType actor_type = 1;
  string    app_id     = 2; // UUID of the application (set when actor_type == APPLICATION)
  string    app_name   = 3; // Display name of the application (denormalized for UI)
}

// ========== Application API Key Messages ==========

message ApplicationInfo {
  string app_id      = 1;
  string name        = 2;
  string description = 3;
  string created_at  = 4;
  string updated_at  = 5;
}

message CreateApplicationRequest {
  string name        = 1;
  string description = 2; // Optional
}

message CreateApplicationResponse {
  ApplicationInfo application = 1;
  string          message     = 2;
}

message ListApplicationsRequest {
  // user_id from auth token
}

message ListApplicationsResponse {
  repeated ApplicationInfo applications = 1;
}

message DeleteApplicationRequest {
  string app_id = 1;
}

message DeleteApplicationResponse {
  string message = 1;
}

message ApiKeyInfo {
  string key_id       = 1;
  string app_id       = 2;
  string key_prefix   = 3; // First ~28 chars of the key (safe to display)
  bool   is_active    = 4; // true when revoked_at is null
  string last_used_at = 5; // ISO8601 or empty
  string created_at   = 6;
  string revoked_at   = 7; // ISO8601 or empty
}

message CreateApiKeyRequest {
  string app_id = 1;
}

message CreateApiKeyResponse {
  ApiKeyInfo key           = 1;
  string     plaintext_key = 2; // Full key — shown ONCE, never stored on server
  string     message       = 3;
}

message ListApiKeysRequest {
  string app_id = 1;
}

message ListApiKeysResponse {
  repeated ApiKeyInfo keys = 1;
}

message RevokeApiKeyRequest {
  string key_id = 1;
}

message RevokeApiKeyResponse {
  string message = 1;
}

// ========== Cross-Device Trigger Reporting ==========

message ReportTriggerFiredRequest {
  // UUID of the trigger that fired.
  string trigger_id   = 1;
  // Human-readable trigger name — carried in the fan-out event so receivers
  // can display it without a separate lookup.
  string trigger_name = 2;
  // device_id of the device that fired the trigger.  Excluded from its own
  // FCM / Realtime fan-out so the originating device is not double-notified.
  string device_id    = 3;
}

message ReportTriggerFiredResponse {}
